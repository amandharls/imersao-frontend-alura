<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

        <h1 id="titulo-selecao-perfil">Quem está assistindo?</h1>
        <section class="profiles" aria-labelledby="titulo-selecao-perfil">

                    <figure>
                        <img src="/Netflix/Assets/perfil1.png" alt="Ícone do Perfil 1 com um personagem em estilo cartoon com olhos de botão">

                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="/Netflix/Assets/perfil2.png" alt="Ícone do Perfil 2 com um boné azul e cinza">
                        <figcaption>Perfil 2</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="/Netflix/Assets/perfil2.png" alt="Ícone do Perfil 3 com um boné azul e cinza">
                        <figcaption>Perfil 3</figcaption>
                    </figure>
                </li>
                <li class="profile">
                    <figure>
                        <img src="/Netflix/Assets/perfil2.png" alt="Ícone do Perfil 4 com um boné azul e cinza">
                        <figcaption>Perfil 4</figcaption>
                    </figure>
                </li>
            </ul>
        </section>
    </main>
</body>
</html>
