<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Netflix</title>
  <link rel="stylesheet" href="style.css">
  <!-- Mesma lógica de theme.js; roda cedo para evitar flash de tema. -->
  <script>
    (function () {
      var key = "nf-theme";
      var light = "light";
      var dark = "dark";
      try {
        var s = localStorage.getItem(key);
        var theme =
          s === light || s === dark
            ? s
            : matchMedia("(prefers-color-scheme: light)").matches
              ? light
              : dark;
        document.documentElement.setAttribute("data-theme", theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === light ? "#f3f3f3" : "#000000");
      } catch (_) {
        document.documentElement.setAttribute("data-theme", dark);
      }
    })();
  </script>
</head>
<body>
    <button
      type="button"
      id="theme-toggle"
      class="theme-toggle"
      aria-pressed="true"
      aria-label="Ativar modo claro"
    >
      <svg data-theme-icon="sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="4"/>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
      </svg>
      <svg data-theme-icon="moon" class="theme-toggle__icon--hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
      </svg>
    </button>
    <main>
        <header>
            <h1 id="titulo-selecao-perfil">Quem está assistindo?</h1>
        </header>
        <section class="profiles" aria-labelledby="titulo-selecao-perfil">
            <nav aria-label="Perfis disponíveis">
                <ul class="profiles-list">
                    <li class="profile">
                        <a class="profile-card" href="Catalogo/catalogo.html?perfil=1">
                            <img src="Assets/perfil1.png" alt="">
                            <span class="profile-name">Amandha</span>
                        </a>
                    </li>
                    <li class="profile">
                        <a class="profile-card" href="Catalogo/catalogo.html?perfil=2">
                            <img src="Assets/perfil2.png" alt="">
                            <span class="profile-name">Vitória</span>
                        </a>
                    </li>
                    <li class="profile">
                        <a class="profile-card" href="Catalogo/catalogo.html?perfil=3">
                            <img src="Assets/perfil2.png" alt="">
                            <span class="profile-name">Caio</span>
                        </a>
                    </li>
                    <li class="profile">
                        <a class="profile-card" href="Catalogo/catalogo.html?perfil=4">
                            <img src="Assets/perfil2.png" alt="">
                            <span class="profile-name">Andréia</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </section>
    </main>
    <script src="theme.js" defer></script>
</body>
</html>
